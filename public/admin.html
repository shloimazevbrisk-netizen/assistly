<!DOCTYPE html>
<html>
<head>
  <title>Admin - Clients</title>
  <style>
    body {
      font-family: Arial;
      background: #f7f7f7;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left {
      font-size: 14px;
    }

    .right button {
      padding: 6px 12px;
      border: none;
      background: #6c63ff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .right button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div id="loginBox" style="margin-bottom:20px;">
  <input type="password" id="adminKeyInput" placeholder="Enter admin key">
  <button onclick="loginAdmin()">Login</button>
</div>

<h2>Clients</h2>

<div id="list"></div>

<script>
fetch("/admin/clients", {
  headers: {
    "x-admin-key": localStorage.getItem("adminKey")
  }
})
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(c => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="left">
  <strong>${c.clientId}</strong><br>
  ${c.companyName}<br>
  ${c.email || "No email"}<br>
  ${getTrialText(c.trialEndsAt)}
</div>
      `;

      list.appendChild(div);
    });
  });

function login(companyId) {
  localStorage.setItem("companyId", companyId);
  window.location.href = "/";
}

function getTrialText(trialEndsAt) {
  if (!trialEndsAt) return "No trial set";

  const now = new Date();
  const end = new Date(trialEndsAt);

  const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));

  if (diff <= 0) return "Trial expired";
  return diff + " days left";
}

function loginAdmin() {
  const key = document.getElementById("adminKeyInput").value;
  localStorage.setItem("adminKey", key);
  location.reload();
}

</script>

</body>
</html>
